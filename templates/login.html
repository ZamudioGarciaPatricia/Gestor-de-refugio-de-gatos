{% extends "base.html" %}

{% block title %} login {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="display-6 fw-bold mb-4 text-center">Entrar</h2>

            <form action="{{ url_for('iniciasesion') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small text-muted opacity-75">Usuario</label>
                    <input type="text" name="user" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted opacity-75">Contraseña</label>
                    <input type="password" name="secreto" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill">Entrar</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('recuperar') }}" class="btn btn-link btn-sm text-decoration-none text-secondary opacity-50">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
