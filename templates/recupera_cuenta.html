{% extends "base.html" %}

{% block title %} Recuperar Cuenta {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="display-6 fw-bold mb-2 text-center">Recuperar cuenta</h2>
            <p class="text-center text-muted small mb-4 opacity-75">Introduce tu correo y te enviaremos un enlace seguro para cambiar tu contraseña.</p>

            <form action="{{ url_for('recuperar') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label small text-muted opacity-75">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                
                <button type="submit" class="btn btn-outline-dark w-100 rounded-pill">Enviar enlace de recuperación</button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('log') }}" class="btn btn-link btn-sm text-decoration-none text-secondary opacity-50">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
