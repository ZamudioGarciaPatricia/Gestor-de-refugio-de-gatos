{% extends "base.html" %}

{% block title %} Registro {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="display-6 fw-bold mb-4 text-center">Registro</h2>

            <form action="{{ url_for('creacuenta') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label small text-muted opacity-75">Nombre Completo</label>
                    <!-- name="nombre completo" coincide con tu app.py -->
                    <input type="text" name="nombre completo" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted opacity-75">Nombre de Usuario</label>
                    <input type="text" name="user" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted opacity-75">Contraseña</label>
                    <input type="password" name="secreto" class="form-control rounded-pill border-light-subtle shadow-none" required>
                </div>
                <button type="submit" class="btn btn-outline-dark w-100 rounded-pill">Registrarme</button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('iniciasesion') }}" class="btn btn-link btn-sm text-decoration-none text-secondary opacity-50">Ya tengo cuenta</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
